<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helix — Manage</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <nav class="site-nav">
        <a href="/" class="nav-link">Run</a>
        <a href="/manage" class="nav-link active">Manage</a>
        <a href="/config" class="nav-link">Config</a>
      </nav>
      <h1>Manage</h1>
      <p class="subtitle">Create agents and skills, then arrange how they work together</p>
    </header>

    <section class="panel workflow-panel" id="workflow-panel">
      <div class="panel-head">
        <h2>Workflow</h2>
        <span id="workflow-status" class="muted" role="status"></span>
      </div>
      <p class="workflow-help">Agents run in this default order. The orchestrator may adapt the sequence when the task benefits.</p>
      <div id="workflow-list" class="workflow-list"></div>
      <form id="workflow-form" class="workflow-form">
        <label>
          <span>Add agent</span>
          <select id="workflow-agent"></select>
        </label>
        <button id="add-workflow-agent" type="button" class="ghost">Add</button>
        <button id="save-workflow" type="submit" disabled>Save workflow</button>
      </form>
    </section>

    <section class="panel inventory-panel" id="inventory-panel">
      <div class="panel-head">
        <h2>Resources</h2>
      </div>
      <div id="inventory" class="inventory"></div>
    </section>

    <section class="panel form-panel">
      <form id="manage-form">
        <label>
          <span>What should Helix configure?</span>
          <textarea id="prompt" name="prompt" rows="4" required placeholder="Create a verifier that runs eslint and tsc…"></textarea>
        </label>
        <div class="actions">
          <button id="submit" type="submit">Send</button>
          <button id="follow-up" type="button" class="ghost hidden">Send follow-up</button>
          <span id="status-pill" class="pill idle">idle</span>
        </div>
      </form>
    </section>

    <section class="panel log-panel">
      <div class="panel-head">
        <h2>Conversation</h2>
        <button id="clear-log" type="button" class="ghost">Clear</button>
      </div>
      <div id="log" class="log" aria-live="polite"></div>
    </section>

    <section class="panel preview-panel hidden" id="preview-panel">
      <div class="panel-head">
        <h2>Drafts</h2>
        <div class="preview-actions">
          <label class="force-label">
            <input id="force-overwrite" type="checkbox" />
            Allow overwrite &amp; delete protected agents
          </label>
          <button id="apply" type="button">Apply</button>
          <button id="discard" type="button" class="ghost">Discard</button>
        </div>
      </div>
      <div id="preview" class="preview"></div>
    </section>
  </div>
  <script src="/manage.js" type="module"></script>
</body>
</html>
